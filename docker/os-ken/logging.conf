[loggers]
keys=root,osken

[handlers]
keys=console

[formatters]
keys=standard

[logger_root]
level=WARNING
handlers=console

[logger_osken]
level=INFO
handlers=console
qualname=os_ken
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=standard
args=(sys.stdout,)

[formatter_standard]
format=%(asctime)s %(levelname)s %(name)s: %(message)s